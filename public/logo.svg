<svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007bff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#28a745;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="40" cy="40" r="38" fill="url(#logoGradient)" stroke="#fff" stroke-width="2"/>

  <!-- Computer setup -->
  <g transform="translate(40,40)">
    <!-- Monitor screen -->
    <rect x="-10" y="-15" width="16" height="10" rx="1" fill="#fff" stroke="#333" stroke-width="1"/>
    <!-- Monitor stand -->
    <rect x="-3" y="-5" width="6" height="3" rx="1" fill="#fff" stroke="#333" stroke-width="1"/>
    <rect x="-4" y="-2" width="8" height="2" rx="1" fill="#fff" stroke="#333" stroke-width="1"/>

    <!-- Keyboard -->
    <rect x="-12" y="2" width="20" height="4" rx="1" fill="#fff" stroke="#333" stroke-width="1"/>
    <!-- Keyboard keys -->
    <rect x="-11" y="3" width="1.5" height="1.5" fill="#666"/>
    <rect x="-9" y="3" width="1.5" height="1.5" fill="#666"/>
    <rect x="-7" y="3" width="1.5" height="1.5" fill="#666"/>
    <rect x="-5" y="3" width="1.5" height="1.5" fill="#666"/>
    <rect x="-3" y="3" width="1.5" height="1.5" fill="#666"/>
    <rect x="-1" y="3" width="1.5" height="1.5" fill="#666"/>
    <rect x="1" y="3" width="1.5" height="1.5" fill="#666"/>
    <rect x="3" y="3" width="1.5" height="1.5" fill="#666"/>
    <rect x="5" y="3" width="1.5" height="1.5" fill="#666"/>
    <rect x="7" y="3" width="1.5" height="1.5" fill="#666"/>

    <!-- Mouse -->
    <ellipse cx="15" cy="5" rx="2" ry="3" fill="#fff" stroke="#333" stroke-width="1"/>
    <rect x="14.5" y="4" width="1" height="2" fill="#666"/>
  </g>

  <!-- TFS Text -->
  <text x="40" y="68" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="16" font-weight="bold">TFS</text>
</svg>